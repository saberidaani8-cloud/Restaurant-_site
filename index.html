<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michwat Alakhawayn</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#fffaf5;
}

header {
  background:#7a3e1d;
  color:white;
  padding:15px;
  text-align:center;
}

.menu {
  padding:20px;
}

.item {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button {
  background:#ff7a00;
  color:white;
  border:none;
  padding:8px;
  width:100%;
}

.cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:#222;
  color:white;
  padding:10px;
}
</style>
</head>

<body>

<header>
  <h1>Michwat Alakhawayn ⭐ 3.9</h1>
</header>

<section class="menu">

  <h2>Menu</h2>

  <!-- 🔥 Editable item -->
  <div class="item">
    <h3 id="dynamicName">Chicken</h3>
    <p id="dynamicPrice">50 MAD</p>
    <button onclick="add()">Ajouter</button>
  </div>

</section>

<div class="cart" id="cart">
  Total: 0 MAD
  <button onclick="order()">Commander</button>
</div>

<!-- Admin button -->
<button onclick="window.location.href='admin.html'">Admin</button>

<script>
let total = 0;
let items = [];

// Add to cart
function add(){
  let name = document.getElementById("dynamicName").innerText;
  let price = parseInt(document.getElementById("dynamicPrice").innerText);

  total += price;
  items.push(name);

  document.getElementById("cart").innerHTML =
    "Total: " + total + " MAD <button onclick='order()'>Commander</button>";
}

// Order via WhatsApp
function order(){
  let message = "Commande:%0A" + items.join("%0A") + "%0ATotal: " + total;
  window.open("https://wa.me/212661600799?text=" + message);
}

// 🔥 LOAD ADMIN DATA
let data = JSON.parse(localStorage.getItem("item"));

if(data){
  document.getElementById("dynamicName").innerText = data.name;
  document.getElementById("dynamicPrice").innerText = data.price + " MAD";
}
</script>

</body>
</html>
